name: Build PersonalComputerDeskOrganizer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/PersonalComputerDeskOrganizer/PersonalComputerDeskOrganizer.csproj

      - name: Build
        run: dotnet build src/PersonalComputerDeskOrganizer/PersonalComputerDeskOrganizer.csproj -c Release --no-restore

      - name: Publish (framework-dependent, win-x64)
        run: dotnet publish src/PersonalComputerDeskOrganizer/PersonalComputerDeskOrganizer.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=false -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonalComputerDeskOrganizer-${{ github.run_number }}
          path: publish/**
          if-no-files-found: error
